global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "swarm-api"
    static_configs:
      - targets: ["swarm-api:9000"]
    metrics_path: /health

  - job_name: "nvidia-gpu"
    static_configs:
      - targets: ["nvidia-exporter:9835"]

  - job_name: "ollama"
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: /api/tags
